<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post a Job</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a href="/">Home</a>
        <a href="/jobs">Jobs</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/logout">Logout</a>
    </nav>
    <div class="container">
        <h2>Post a Job</h2>
        <form method="POST" class="card">
            <input type="text" name="title" placeholder="Job Title" required><br>
            <textarea name="description" placeholder="Job Description" required></textarea><br>
            <input type="text" name="company" placeholder="Company" required><br>
            <input type="text" name="location" placeholder="Location" required><br>
            <input type="number" name="salary" placeholder="Salary" step="0.01" required><br>
            <button type="submit" class="btn">Post Job</button>
        </form>
    </div>
    <script src="/static/js/scripts.js"></script>
</body>
</html>
